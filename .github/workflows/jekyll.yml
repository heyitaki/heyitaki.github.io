# Build the Jekyll site with our own Gemfile (Jekyll 4) and deploy it to GitHub
# Pages. Replaces the legacy Pages builder, which was pinned to Jekyll 3.9.
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # The unsettled app repo pings this (via its notify-site.yml) whenever it
  # pushes to main, so the site rebuilds with the latest app — no submodule.
  repository_dispatch:
    types: ["unsettled-update"]

# Permissions required for the deploy-pages action to publish via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3" # Keep in sync with .ruby-version.
          bundler-cache: true # bundle install + cache gems between runs.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      # Build the offline Catan app from its own repo at deploy time and drop it
      # into _site/unsettled. Pulling main directly means no submodule pointer to
      # bump; served as static files (Pages runs no Jekyll on the artifact).
      - name: Checkout unsettled app
        uses: actions/checkout@v7
        with:
          repository: heyitaki/unsettled
          ref: main
          path: unsettled-src
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: unsettled-src/package-lock.json
      - name: Build unsettled
        run: npm ci && npm run build
        working-directory: unsettled-src
      - name: Copy unsettled into site
        run: |
          mkdir -p _site/unsettled
          cp -r unsettled-src/dist/. _site/unsettled/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
